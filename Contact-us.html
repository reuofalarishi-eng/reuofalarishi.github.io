<section>
    <h2>Contact Us !</h2>
    <h3> Please fill out this form </h3>
    <form action="#" method="post">

        
        <label>First Name:</label><br>
        <input type="text" name="first_name" placeholder="Your first Name" required autofocus><br><br>

        <label>Last Name:</label><br>
        <input type="text" name="last_name" placeholder="Your last name" required><br><br>

        <label>Gender:</label><br>
        <input type="radio" name="gender" value="male"> Male<br>
        <input type="radio" name="gender" value="female"> Female<br><br>


       
        <label>Phone Number:</label><br>
        <input type="tel" name="mobile" placeholder=" e.g. : 0509206412" required maxlength="10" minlength="10"><br><br>

        
        <label>Date of Birth:</label><br>
        <input type="date" name="dob" required><br><br>

        
        <label>Email Address:</label><br>
        <input type="email" name="email" required placeholder="e.g. : rrhhff@gmail.com"><br><br>

        
        <label>Preferred Language:</label><br>
        <select name="language">
            <option value="arabic">Arabic</option>
            <option value="english">English</option>
            <option value="french">French</option>
            <option value="Spanish">Spanish</option>
        </select><br><br>

        <label> Education</label><br>
        <select >
         <option value=" AI">AI</option>
         <option value=" Data Science ">Data Science</option>
         <option value=" Software Engineering"> Software Engineering</option>
         <option value=" Cyber Security">Cyber Security</option>
        <option value="other">Other</option>     
        </select><br><br>
       
        <label>Message:</label><br>
        <textarea name="message" rows="5" cols="30"></textarea><br><br>

       
        <input type="submit" value="Submit">

    </form>
